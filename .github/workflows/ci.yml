name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# The `db` job below is the RLS security gate (CLAUDE.md invariant #7: every
# tenant-scoped table gets a generated cross-tenant attack test; a table without
# a policy fails the build). It runs the portable plpgsql suite on a plain
# Postgres 17 container via the Supabase shim — no Docker/Supabase-local needed.
# Real-Supabase parity comes from the Supabase GitHub integration, which applies
# supabase/migrations/*.sql to a preview branch on every PR (plan-final §1).
# NOTE (next unit): the jobs-queue concurrency ("double-tick executes once") test
# is added to the `db` job when the queue migration lands.

jobs:
  check:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -w typecheck
      - run: pnpm -w lint
      - run: pnpm -w test
      - run: pnpm -w build
      - name: no secrets in built web artifacts
        # Threat model §1/§6: the service-role key, the workers' pool string,
        # and Stripe live-key prefixes must never reach the client bundle.
        run: |
          if grep -rIn -e 'SUPABASE_SERVICE_ROLE_KEY' -e 'SUPABASE_DB_URL' \
              -e 'sk_live' -e 'rk_live' apps/web/dist; then
            echo "::error::secret reference found in the built web bundle"
            exit 1
          fi
      - name: no Supabase/secret material in built member artifacts
        # plan-member-app §5/§7: the member web bundle ships ZERO Supabase
        # material (no URL, no anon key, no @supabase specifier) and no
        # secrets — the structural successor to the retired fail-closed
        # PostgREST assertion (with no member JWTs in existence, the control
        # is "no credential material ships at all"). Greps whichever output
        # dirs the Start build produced.
        run: |
          if grep -rIn -e 'SUPABASE_SERVICE_ROLE_KEY' -e 'SUPABASE_DB_URL' \
              -e 'SUPABASE_ANON_KEY' -e 'SUPABASE_URL' \
              -e 'sk_live' -e 'rk_live' \
              -e 'supabase\.co' -e 'supabase\.in' -e '@supabase' \
              apps/member/dist apps/member/.output 2>/dev/null; then
            echo "::error::Supabase/secret material found in the built member bundle"
            exit 1
          fi

  secrets:
    name: secrets scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan the PR commit range (a shallow
          # depth-1 clone makes the range unresolvable → the action errors out).
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # gitleaks-action v2 requires the auto-created token to scan PRs.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

      - name: no Supabase service-role JWT committed
        # Supabase JWTs are HS256; a service-role token's payload base64-encodes
        # `"role":"service_role"` ("c2VydmljZV9yb2xl"). Best-effort grep —
        # gitleaks above is the real detector.
        run: |
          if grep -rInE 'eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]*c2VydmljZV9yb2xl[A-Za-z0-9_.-]*' . \
              --exclude-dir=.git --exclude-dir=node_modules; then
            echo "::error::possible Supabase service-role JWT committed"
            exit 1
          fi

      - name: no service-role reference in apps/web sources
        # Invariant: the service role key bypasses RLS and never appears
        # client-side (ESLint guardrail catches it locally; this is the CI gate).
        run: |
          if grep -rIn 'SUPABASE_SERVICE_ROLE_KEY' apps/web \
              --include='*.ts' --include='*.tsx' --include='*.js' --include='*.jsx' \
              --include='*.mts' --include='*.mjs'; then
            echo "::error::SUPABASE_SERVICE_ROLE_KEY referenced from apps/web"
            exit 1
          fi

      - name: no Supabase material in member client sources
        # plan-member-app §3.1 ground 2 / §5: the member web app and the shared
        # member-core ship ZERO Supabase material — no anon key, no URL, no
        # @supabase import (the only backend contact is the /api proxy).
        # packages/member-core also carries a vitest import guard
        # (test/import-guard.test.ts) that runs in the check job's test step.
        # Test dirs are excluded: the guards legitimately NAME the banned
        # strings in their matchers.
        run: |
          if grep -rIn -e '@supabase' -e 'SUPABASE_URL' -e 'SUPABASE_ANON_KEY' \
              -e 'SUPABASE_SERVICE_ROLE_KEY' -e 'SUPABASE_DB_URL' \
              -e 'supabase\.co' -e 'supabase\.in' \
              apps/member/src packages/member-core/src \
              --include='*.ts' --include='*.tsx' --include='*.js' --include='*.jsx' \
              --include='*.mts' --include='*.mjs'; then
            echo "::error::Supabase material referenced from member client sources"
            exit 1
          fi

      - name: member site ships zero cron/background work
        # CLAUDE.md invariant #4, by machine (plan-member-app §5): exactly one
        # scheduler — the primary site's tick + jobs queue. The member site
        # ships none: no cron key in its netlify.toml (the word itself is
        # banned there), no scheduled/background-function imports or files
        # under apps/member.
        run: |
          if grep -In 'schedule' apps/member/netlify.toml; then
            echo "::error::cron-style config found in apps/member/netlify.toml"
            exit 1
          fi
          if grep -rIn '@netlify/functions' apps/member \
              --include='*.ts' --include='*.tsx' --include='*.js' --include='*.jsx' \
              --include='*.mts' --include='*.mjs' --exclude-dir=node_modules \
              --exclude-dir=dist --exclude-dir=dist-test --exclude-dir=.output; then
            echo "::error::a Netlify function import (the cron API) appeared under apps/member"
            exit 1
          fi
          if find apps/member -name '*-background.*' \
              -not -path '*/node_modules/*' -not -path '*/dist/*' | grep .; then
            echo "::error::a Netlify background function file appeared under apps/member"
            exit 1
          fi

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: dependency audit (non-blocking)
        continue-on-error: true
        run: pnpm audit --prod

  db:
    name: DB gate — RLS attack + queue concurrency (Postgres 17)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - name: install postgresql-client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: bootstrap + migrations + RLS attack suite
        # scripts/db-test.sh: _bootstrap.sql (Supabase shim) → migrations in order
        # → rls_attack.sql. Any failed assertion RAISEs → psql non-zero → job fails.
        run: ./scripts/db-test.sh
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: jobs-queue concurrency (double-tick executes once)
        # Migrations are already applied (db-test.sh above); this runs the
        # two-connection SKIP-LOCKED proof against the same Postgres service.
        # Invoked at repo root so the root vitest config's include globs resolve
        # (DATABASE_URL is set at the job level → the skipIf gate goes active).
        run: pnpm exec vitest run packages/db/test/jobs_concurrency.test.ts
      - name: booking concurrency storm (zero double-bookings)
        # The phase-6 gate: 12 genuinely-parallel book_session calls at a 3-seat
        # session must let exactly 3 win and refuse the rest session_full — the
        # live proof behind block 32's sequential over-capacity refusal. Same
        # Postgres service, migrations already applied above.
        run: pnpm exec vitest run packages/db/test/booking_storm.test.ts
